<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- "Add to Home Screen" → launch fullscreen (standalone), no Safari chrome.
         iOS has no requestFullscreen for normal elements, so this is the way. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="TabTerm" />
    <!-- Installable PWA: manifest + icons + theme. Chrome shows "Install app" and
         launches in a standalone (chromeless) window; iOS uses the apple-* meta
         above for Add-to-Home-Screen. NB: Chrome only registers the SW / offers
         install over a secure context (https or localhost) — plain http on a LAN
         host needs https or the per-origin "treat as secure" flag. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0e1117" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>TabTerm</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
